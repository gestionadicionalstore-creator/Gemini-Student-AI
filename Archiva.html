<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java y HTML - Registro Histórico</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }
    body {
        background: #0f0f0f;
        color: white;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }
    .archive-container {
        max-width: 600px;
        width: 100%;
        background: #181818;
        padding: 30px;
        border-radius: 25px;
        box-shadow: 0 0 25px rgba(0,0,0,0.7);
    }
    
    /* MODIFICADO: Estructura de tabla para alinear el encabezado de forma limpia */
    .header-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
        border-bottom: 1px solid #2a2a2a;
    }
    .header-table td {
        padding-bottom: 15px;
        vertical-align: middle;
    }
    .title-cell {
        font-size: 24px;
        font-weight: bold;
        color: #7a5cff;
    }
    .info-cell {
        font-size: 12px;
        color: #aaa;
        text-align: center;
    }
    .btn-cell {
        text-align: right;
    }

    /* NUEVO: Botón para borrar todos los mensajes */
    .clear-all-btn {
        background: #ff0055;
        color: white;
        border: none;
        padding: 8px 14px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
        font-weight: bold;
        transition: background 0.2s, transform 0.2s;
    }
    .clear-all-btn:hover {
        background: #d00044;
        transform: scale(1.05);
    }

    .grid-logs {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    .saved-msg-card {
        background: #222;
        padding: 16px;
        padding-right: 35px;
        border-radius: 15px;
        border-left: 4px solid #00ffcc;
        font-size: 14px;
        line-height: 1.5;
        position: relative;
        animation: slideIn 0.3s ease;
    }
    .delete-btn {
        position: absolute;
        top: 10px;
        right: 15px;
        background: transparent;
        color: rgba(255, 255, 255, 0.4);
        border: none;
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        font-weight: bold;
        transition: color 0.2s, transform 0.2s;
    }
    .delete-btn:hover {
        color: #ff0055;
        transform: scale(1.2);
    }
    .msg-expiry {
        font-size: 11px;
        color: #888;
        margin-top: 8px;
        display: block;
    }
    .empty-state {
        text-align: center;
        color: #666;
        font-style: italic;
        padding: 20px;
    }
    @keyframes slideIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="archive-container">
    
    <table class="header-table">
        <tr>
            <td class="title-cell">📁 Java y html</td>
            <td class="info-cell">Retención: 10 min</td>
            <td class="btn-cell">
                <button class="clear-all-btn" onclick="borrarTodo()">Seccionar</button>
            </td>
        </tr>
    </table>
    
    <div class="grid-logs" id="archiveGrid">
        </div>

       
</div>
<br>
<br>
 <a href="./Mensajes .html" style="color: white;">REGRESAR</a>

<script>
    const archiveGrid = document.getElementById("archiveGrid");
    let historialMensajes = [];

    function cargarYRenderizar() {
        historialMensajes = JSON.parse(localStorage.getItem("java_html_logs")) || [];
        archiveGrid.innerHTML = "";

        if (historialMensajes.length === 0) {
            archiveGrid.innerHTML = `<div class="empty-state">No hay registros almacenados en el búfer.</div>`;
            return;
        }

        historialMensajes.forEach((item, index) => {
            const tiempoRestante = Math.max(0, Math.ceil((item.expiraEn - Date.now()) / 2000));
            const minutos = Math.floor(tiempoRestante / 60);
            const segundos = tiempoRestante % 60;

            const card = document.createElement("div");
            card.classList.add("saved-msg-card");
            card.innerHTML = `
                <button class="delete-btn" onclick="borrarRegistro(${index})">&times;</button>
                <strong style="color: #a291ff; display:block; margin-bottom:4px;">ID Terminal: ${item.usuarioCorto}</strong>
                <div>${item.texto}</div>
                <span class="msg-expiry">Destrucción automática en: ${minutos}m ${segundos}s</span>
            `;
            archiveGrid.appendChild(card);
        });
    }

    // Borrado de un solo mensaje
    window.borrarRegistro = function(index) {
        historialMensajes.splice(index, 1);
        localStorage.setItem("java_html_logs", JSON.stringify(historialMensajes));
        cargarYRenderizar();
    };

    // NUEVO: Función para limpiar absolutamente todo el historial
    window.borrarTodo = function() {
        if(historialMensajes.length === 0) return;
        
        // Confirmación rápida de seguridad
        if(confirm("¿Estás seguro de que quieres eliminar todo el historial de archivos?")) {
            historialMensajes = [];
            localStorage.setItem("java_html_logs", JSON.stringify(historialMensajes));
            cargarYRenderizar();
        }
    };

    // Filtro temporal automático por segundo
    setInterval(() => {
        const ahora = Date.now();
        const largoPrevio = historialMensajes.length;
        historialMensajes = historialMensajes.filter(item => item.expiraEn > ahora);
        
        if (historialMensajes.length !== largoPrevio || historialMensajes.length > 0) {
            localStorage.setItem("java_html_logs", JSON.stringify(historialMensajes));
            cargarYRenderizar();
        }
    }, 1000);

    // Carga inicial
    cargarYRenderizar();
</script>
</body>
</html>
